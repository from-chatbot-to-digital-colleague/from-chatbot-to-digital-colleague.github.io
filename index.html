<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Next-Generation AI Systems</title>
    <meta name="description" content="Project page for the Next-Generation AI Systems paper.">
    <style>
      :root {
        --youtu-blue: #0052d9;
        --link-blue: #0066bf;
        --paper-blue: #edf5fe;
        --paper-text: #1c2b33;
        --paper-bg: #f1f4f7;
        --frame-blue: #36558c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Source Sans Pro", "Segoe UI", Arial, sans-serif;
        color: var(--paper-text);
        background: #fff;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 48px 20px;
        background:
          linear-gradient(180deg, rgba(237, 245, 254, 0.92), rgba(255, 255, 255, 0.98)),
          var(--paper-bg);
      }

      .paper-shell {
        width: min(920px, 100%);
        border-top: 4px solid var(--youtu-blue);
        background: #fff;
        padding: clamp(28px, 6vw, 64px);
        box-shadow: 0 24px 80px rgba(28, 43, 51, 0.12);
      }

      .eyebrow {
        margin: 0 0 16px;
        color: var(--frame-blue);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.8rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 6vw, 5rem);
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 24px 0 0;
        font-size: 1.15rem;
        line-height: 1.7;
      }

      a {
        color: var(--link-blue);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="paper-shell" aria-label="Paper project placeholder">
        <p class="eyebrow">Paper Project Page</p>
        <h1>Next-Generation AI Systems</h1>
        <p>
          This GitHub Pages site is ready for the paper publicity website.
          The full project page can now be built on top of the Tencent YouTu
          paper visual language extracted from the LaTeX source.
        </p>
      </section>
    </main>
  </body>
</html>
